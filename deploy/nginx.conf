# One origin for the whole app: serve the frontend, proxy REST to the engine, proxy the
# live WebSocket to the gateway. Same-origin → no CORS needed.
#
# Runs under nginx-unprivileged (non-root), so it listens on 8080; the compose maps host 80 → 8080.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match the engine's upload cap (max_upload_mb=25). nginx's 1 MB default would 413 uploads to
    # /api/documents, /api/parse, /api/transcribe before they ever reach the engine.
    client_max_body_size 25m;

    # --- Edge auth (the gate for browser traffic) ---------------------------------------------
    # HTTP Basic auth over the whole origin. This is the proportionate access gate for a shared demo
    # (accounts are parked — D5): the browser prompts natively and the SPA's same-origin /api + /ws
    # calls inherit the credentials, so no secret ever lands in the JS bundle. MUST be paired with
    # TLS (see DEPLOY.md Part 10) — Basic auth over plain HTTP sends credentials in the clear.
    # Create the password file before `up`:  htpasswd -c deploy/.htpasswd <user>
    auth_basic           "The Pack";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Unauthenticated liveness endpoint for the container HEALTHCHECK only.
    location = /healthz {
        auth_basic off;
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Frontend SPA — fall back to index.html for client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST commands → Python engine. /api/hunts → engine /hunts. Swagger at /api/docs.
    location /api/ {
        proxy_pass http://engine:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Defense in depth: if you set API_AUTH_TOKEN in .env.prod, inject it here so the engine is
        # gated even if reached directly. This overrides the inbound Basic auth header for the engine.
        #   proxy_set_header Authorization "Bearer <paste API_AUTH_TOKEN here>";
    }

    # Live event stream → Rust gateway. /ws/hunts/:id/stream → gateway /hunts/:id/stream.
    location /ws/ {
        proxy_pass http://gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # long-lived hunt streams
        proxy_send_timeout 3600s;
    }
}
