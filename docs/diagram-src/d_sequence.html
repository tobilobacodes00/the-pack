<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<style>
  @font-face{font-family:'Poppins';font-weight:400;src:url('fonts/poppins-400.woff2') format('woff2');}
  @font-face{font-family:'Poppins';font-weight:500;src:url('fonts/poppins-500.woff2') format('woff2');}
  @font-face{font-family:'Poppins';font-weight:600;src:url('fonts/poppins-600.woff2') format('woff2');}
  @font-face{font-family:'Poppins';font-weight:700;src:url('fonts/poppins-700.woff2') format('woff2');}
  @font-face{font-family:'Poppins';font-weight:800;src:url('fonts/poppins-800.woff2') format('woff2');}
  :root{--ink:#15171c;--ink2:#5c636e;--ink3:#9aa0aa;--hair:#e4e6ea;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1780px;}
  body{font-family:'Poppins',Arial,sans-serif;background:#fff;color:var(--ink);-webkit-font-smoothing:antialiased;padding:52px 60px 46px;}
  .kick{font-size:13px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--ink3);}
  h1{font-size:40px;font-weight:800;letter-spacing:-1px;margin:10px 0 8px;}
  .sub{font-size:17px;font-weight:400;color:var(--ink2);line-height:1.5;max-width:1000px;}
  .rule{height:1.6px;background:var(--hair);margin:24px 0 10px;}

  #canvas{position:relative;}
  #wires{position:absolute;inset:0;z-index:0;}
  .head{position:absolute;transform:translateX(-50%);text-align:center;z-index:2;
    border:1.7px solid var(--ink);border-radius:13px;padding:11px 8px 10px;background:#fff;width:186px;}
  .head.fill{background:var(--ink);border-color:var(--ink);}
  .head .n{font-size:16.5px;font-weight:700;letter-spacing:-.2px;line-height:1;}
  .head .s{font-size:11.5px;color:var(--ink2);margin-top:4px;}
  .head.fill .n{color:#fff;} .head.fill .s{color:#c3c8d0;}
  .mlab{position:absolute;transform:translate(-50%,-50%);z-index:3;background:#fff;padding:3px 12px;
    font-size:13.5px;font-weight:600;color:var(--ink);white-space:nowrap;}
  .mlab.dim{color:var(--ink2);font-weight:500;}
  .note{position:absolute;z-index:2;background:#fbfbfc;border:1.5px solid var(--hair);border-left:3px solid var(--ink);
    border-radius:12px;padding:12px 18px;font-size:14px;color:var(--ink2);line-height:1.45;}
  .note b{color:var(--ink);font-weight:600;}
</style></head>
<body>
  <div class="kick">The Pack</div>
  <h1>One hunt, start to finish</h1>
  <div class="sub">Follow a single hunt down the page. Solid lines are the request path. Dashed lines are replies and the live event stream. The projection loop repeats for every event.</div>
  <div class="rule"></div>
  <div id="canvas"><svg id="wires" preserveAspectRatio="none"></svg></div>

<script>
  var P = {
    B:{n:'Browser',s:'the screen',x:150},
    E:{n:'Engine',s:'FastAPI',x:470},
    S:{n:'Supervisor',s:'the pack',x:790},
    Q:{n:'Qwen',s:'the model',x:1090},
    DB:{n:'PostgreSQL',s:'source of truth',x:1370,fill:true},
    PR:{n:'Projection',s:'relay, Redis, gateway',x:1620}
  };
  var order=['B','E','S','Q','DB','PR'];
  var rows=[
    {from:'B',to:'E',lab:'POST /hunts  (a task)'},
    {from:'E',to:'B',lab:'202 Accepted',dash:true},
    {from:'B',to:'PR',lab:'subscribe: open WebSocket, from seq 0'},
    {from:'E',to:'DB',lab:'write hunt_created  ·  one transaction'},
    {note:1,span:['E','PR'],lab:'<b>The projection loop.</b> Every committed event flows Postgres to the relay, to Redis, to the gateway, to the browser. Everything below runs back through this same loop, so the screen keeps up in real time.'},
    {from:'E',to:'S',lab:'start the hunt'},
    {from:'S',to:'Q',lab:'Beta drafts a plan'},
    {from:'Q',to:'S',lab:'the plan',dash:true},
    {from:'S',to:'DB',lab:'emit plan_proposed'},
    {from:'B',to:'E',lab:'POST plan/approve  ·  set the Boundary'},
    {from:'E',to:'S',lab:'approve'},
    {from:'S',to:'Q',lab:'run the pack  ·  every call checks the Boundary first'},
    {from:'Q',to:'S',lab:'findings and a draft',dash:true},
    {from:'S',to:'DB',lab:'emit  spawned · tool_used · artifact_created · hunt_completed'},
    {from:'B',to:'E',lab:'GET /artifact'},
    {from:'E',to:'B',lab:'the final brief',dash:true},
    {note:1,span:['B','S'],lab:'<b>The chat side-channel.</b> Ask Alpha a question mid-hunt and the answer streams back token by token over SSE, straight from the engine, never through the gateway. Different shape of data, different door.'}
  ];

  var HEAD_TOP=18, LIFE_TOP=104, START=176, GAP=64;
  var svg=document.getElementById('wires');
  var canvas=document.getElementById('canvas');
  var W=1780-120; // content width
  var NS='http://www.w3.org/2000/svg';
  function line(x1,y1,x2,y2,dash,w){var l=document.createElementNS(NS,'line');l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);l.setAttribute('stroke','#15171c');l.setAttribute('stroke-width',w||1.7);if(dash)l.setAttribute('stroke-dasharray','7 5');svg.appendChild(l);}
  function arrow(x,y,dir){var p=document.createElementNS(NS,'path');var d=dir>0?('M'+(x-10)+','+(y-6)+' L'+x+','+y+' L'+(x-10)+','+(y+6)):('M'+(x+10)+','+(y-6)+' L'+x+','+y+' L'+(x+10)+','+(y+6));p.setAttribute('d',d);p.setAttribute('fill','none');p.setAttribute('stroke','#15171c');p.setAttribute('stroke-width',1.7);p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');svg.appendChild(p);}

  // headers
  for(var i=0;i<order.length;i++){var p=P[order[i]];var d=document.createElement('div');d.className='head'+(p.fill?' fill':'');d.style.left=p.x+'px';d.style.top=HEAD_TOP+'px';d.innerHTML='<div class="n">'+p.n+'</div><div class="s">'+p.s+'</div>';canvas.appendChild(d);}

  // compute layout
  var y=START, lifeBottom;
  var draw=[];
  for(var r=0;r<rows.length;r++){
    var row=rows[r];
    if(row.note){
      var x1=P[row.span[0]].x, x2=P[row.span[1]].x;
      var left=x1-70; if(left<0)left=0; var width=(x2-x1)+230; if(left+width>W-8)width=W-8-left;
      draw.push({kind:'note',lab:row.lab,left:left,top:y,width:width});
      y+= (row.span[0]==='B'? 118 : 84);
      y+=18;
    } else {
      var xf=P[row.from].x, xt=P[row.to].x;
      draw.push({kind:'msg',xf:xf,xt:xt,y:y,lab:row.lab,dash:row.dash});
      y+=GAP;
    }
  }
  lifeBottom=y+6;
  var H=lifeBottom+30;
  canvas.style.height=H+'px';
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  svg.style.width=W+'px'; svg.style.height=H+'px';

  // lifelines
  for(var i=0;i<order.length;i++){var p=P[order[i]];line(p.x,LIFE_TOP,p.x,lifeBottom,false,1.4);var ll=svg.lastChild;ll.setAttribute('stroke','#d7dbe1');}

  // messages + notes
  for(var k=0;k<draw.length;k++){var it=draw[k];
    if(it.kind==='msg'){
      line(it.xf,it.y,it.xt,it.y,it.dash,1.8);
      arrow(it.xt,it.y, it.xt>it.xf?1:-1);
      var lab=document.createElement('div');lab.className='mlab'+(it.dash?' dim':'');
      lab.style.left=((it.xf+it.xt)/2)+'px';lab.style.top=(it.y-15)+'px';lab.innerHTML=it.lab;canvas.appendChild(lab);
    } else {
      var nb=document.createElement('div');nb.className='note';nb.style.left=it.left+'px';nb.style.top=it.top+'px';nb.style.width=it.width+'px';nb.innerHTML=it.lab;canvas.appendChild(nb);
    }
  }
</script>
</body></html>
