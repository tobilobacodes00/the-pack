# Local dev infra for the hello-pack seam (Doc 04 §7). On Alibaba Cloud these become
# Tair (Redis) and ApsaraDB RDS (Postgres); locally they are plain containers.
#
#   docker compose up -d redis postgres
#
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pack
      POSTGRES_PASSWORD: pack
      POSTGRES_DB: pack
    ports:
      - "5432:5432"
    volumes:
      - pack_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pack"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pack_pg:
