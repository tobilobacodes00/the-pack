# Weekly dependency update PRs for every ecosystem in the repo. Keeps the supply chain patched
# without a human remembering to check. Grouped so a week's bumps arrive as one PR per ecosystem.
version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule: { interval: weekly }
    groups:
      backend: { patterns: ["*"] }

  - package-ecosystem: npm
    directory: /frontend
    schedule: { interval: weekly }
    groups:
      frontend: { patterns: ["*"] }

  - package-ecosystem: cargo
    directory: /gateway
    schedule: { interval: weekly }
    groups:
      gateway: { patterns: ["*"] }

  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }

  - package-ecosystem: docker
    directory: /deploy
    schedule: { interval: weekly }
