name: frontend

# Runs only when frontend/ changes.
on:
  push:
    branches: [main, "setup/**", "feat/**", "fix/**"]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]
  pull_request:
    branches: [main]
    paths: ["frontend/**", ".github/workflows/frontend.yml"]

jobs:
  frontend:
    name: typecheck, build, reducer tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage   # tests + coverage ratchet (thresholds in vite.config.ts)
      - run: pnpm build
      - run: pnpm audit --audit-level=high   # dependency CVE scan (fail on high/critical)
