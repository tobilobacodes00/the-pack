# Pre-commit: formatting, lint, type + architecture gates, and a SECRET SCAN before anything is
# committed (Doc 05 §03). What runs here is the fast subset meant to catch issues BEFORE they reach
# CI; CI (.github/workflows/) remains the full gate (adds pytest, pip-audit, pnpm test, cargo check).
# Install once:  pip install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict

  # Secret scan — real secrets never committed.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # Python (backend): lint + format. Pinned to match the CI/dev pin in backend/pyproject.toml so the
  # hook and the pipeline can never disagree (they did — the old pin was bypassed).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # Frontend: Prettier formatting for TS/TSX/JSON/CSS/MD.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|css|json|md)$

  # Local hooks that call the project's OWN tools (via uv / pnpm), so the hook can never pin a
  # different version than CI does. These mirror CI's static gates so a broken type/lint is caught at
  # commit time, not after a push (CI still re-runs them + the full test suites as the authority).
  - repo: local
    hooks:
      # Backend static type gate — same `mypy app` CI runs (backend.yml).
      - id: mypy-backend
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run mypy app'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      # Backend architecture-invariant guard — the AST tripwire (LLM funnel + SSRF blocklist).
      - id: arch-guard
        name: architecture invariants (backend)
        entry: bash -c 'cd backend && uv run python scripts/check_architecture.py'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      # Frontend lint — same `eslint .` CI runs (frontend.yml); previously only prettier (format) ran
      # pre-commit, so a lint error slipped through to CI.
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && pnpm -s lint'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false

      # Rust (gateway): cargo fmt check.
      - id: cargo-fmt
        name: cargo fmt (gateway)
        entry: bash -c 'cd gateway && cargo fmt --check'
        language: system
        files: ^gateway/.*\.rs$
        pass_filenames: false
